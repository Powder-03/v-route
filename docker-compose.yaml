services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - optiprompt-net
    depends_on:
      - fastapi_worker_1

  fastapi_worker_1:
    build: ./api_gateway
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis_cache:6379/0
      - KAFKA_BROKER=kafka_broker:9092
    networks:
      - optiprompt-net

  redis_cache:
    image: redis/redis-stack-server:latest 
    ports:
      - "6379:6379"
    networks:
      - optiprompt-net

  kafka_broker:
    image: apache/kafka:latest
    environment:
      # Official Apache Kafka KRaft Variables
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka_broker:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka_broker:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"
    networks:
      - optiprompt-net

  postgres_db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secretpassword
      - POSTGRES_DB=telemetry
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - optiprompt-net

  golang_worker:
    build: ./go_worker
    environment:
      - KAFKA_BROKER=kafka_broker:9092
      - DB_URL=postgres://admin:secretpassword@postgres_db:5432/telemetry
    networks:
      - optiprompt-net
    depends_on:
      - kafka_broker
      - postgres_db

networks:
  optiprompt-net:
    driver: bridge