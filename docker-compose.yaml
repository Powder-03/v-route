services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      # - "443:443" # Uncomment when SSL is configured
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - optiprompt-net
    depends_on:
      - fastapi_worker_1

  fastapi_worker_1:
    build: ./api_gateway
    # ports:
    #   - "8001:8000" # Removed for production security
    env_file:
      - .env
    environment:
      # Only docker-network-specific values here; everything else comes from .env
      - REDIS_URL=redis://redis_cache:6379/0
      - KAFKA_BROKER=kafka_broker:9092
      - DB_URL=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secretpassword}@postgres_db:5432/${POSTGRES_DB:-telemetry}
    networks:
      - optiprompt-net
    depends_on:
      redis_cache:
        condition: service_healthy
      kafka_broker:
        condition: service_healthy
      postgres_db:
        condition: service_healthy


  redis_cache:
    image: redis/redis-stack-server:latest
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - optiprompt-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka_broker:
    image: confluentinc/confluent-local:7.6.1
    hostname: kafka_broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka_broker:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka_broker:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    # ports:
    #   - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - optiprompt-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5

  postgres_db:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - POSTGRES_DB=${POSTGRES_DB:-telemetry}
    # ports:
    #   - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - optiprompt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-telemetry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  golang_worker:
    build: ./go_worker
    env_file:
      - .env
    environment:
      - KAFKA_BROKER=kafka_broker:9092
      - DB_URL=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secretpassword}@postgres_db:5432/${POSTGRES_DB:-telemetry}
    networks:
      - optiprompt-net
    depends_on:
      kafka_broker:
        condition: service_healthy
      postgres_db:
        condition: service_healthy

networks:
  optiprompt-net:
    driver: bridge

volumes:
  redis_data:
  kafka_data:
  postgres_data: